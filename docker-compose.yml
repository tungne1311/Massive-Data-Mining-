# ─────────────────────────────────────────────────────────────────
# Cấu hình trên máy 16GB RAM
# ─────────────────────────────────────────────────────────────────
# RecSys Pipeline v3 — Docker Compose (16GB RAM Optimized Edition)
#
# Khởi động hạ tầng:
#   docker compose up -d minio minio-init spark-master spark-worker-1
#
# Chạy pipeline (sau khi cluster đã up):
#   docker compose run --rm pipeline --step 3_6 --config-id baseline
#   docker compose run --rm pipeline --step all --config-id baseline
# ─────────────────────────────────────────────────────────────────

# ── Biến dùng chung ───────────────────────────────────────────────
x-minio-env: &minio-env
  MINIO_ENDPOINT:   "http://minio:9000"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
  MINIO_BUCKET:     "recsys"

x-spark-s3a-env: &spark-s3a-env
  <<: *minio-env
  SPARK_MASTER: "spark://spark-master:7077"

services:

  # ── MinIO (object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: recsys_minio
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER:     "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1536m # ~1.5GB cho MinIO
    networks:
      - recsys_net

  # ── Khởi tạo bucket MinIO ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: recsys_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/recsys;
        echo 'Bucket recsys sẵn sàng';
      "
    networks:
      - recsys_net

  # ── Spark Master ───────────────────────────────────────────────
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
    image: recsys-pipeline:v3
    container_name: recsys_spark_master
    hostname: spark-master
    environment:
      SPARK_MODE:                     "master"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED:   "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED:              "no"
    ports:
      - "18080:8080"
      - "17077:7077"
    volumes:
      - ./data/logs:/app/data/logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/python/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080')\" 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1024m # Cấp 1GB cho Master vì chỉ làm nhiệm vụ điều phối
    networks:
      - recsys_net

  # ── Spark Worker 1 (DUY NHẤT) ──────────────────────────────────
  spark-worker-1:
    image: recsys-pipeline:v3
    container_name: recsys_spark_worker_1
    hostname: spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE:        "worker"
      SPARK_MASTER_URL:  "spark://spark-master:7077"
      SPARK_WORKER_MEMORY: "6g" # Bộ nhớ thực tế Spark JVM nhìn thấy
      SPARK_WORKER_CORES:  "3"  # Giữ lại 1 core cho MinIO/OS
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED:     "no"
    ports:
      - "18081:8081"
    volumes:
      - ./data/logs:/app/data/logs
      - hf_cache:/app/.cache/huggingface
    mem_limit: 8g # Giới hạn cứng Docker (6g JVM + 2g cho overhead/off-heap)
    cpus: "3.0"
    networks:
      - recsys_net

  # ── Pipeline (spark-submit client) ─────────────────────────────
  pipeline:
    image: recsys-pipeline:v3
    container_name: recsys_pipeline
    hostname: pipeline-driver
    depends_on:
      minio-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    entrypoint: ["/app/scripts/run_pipeline.sh"]
    environment:
      <<: *spark-s3a-env
      SPARK_DRIVER_MEMORY:   "3g" # Driver chỉ cần ít RAM để giữ Job
      SPARK_EXECUTOR_MEMORY: "6g" # Phải khớp với cấp phát ở worker
      SPARK_EXECUTOR_CORES:  "3"  
      MAX_REVIEW_RECORDS:    "${MAX_REVIEW_RECORDS:-null}"
      MAX_METADATA_RECORDS:  "${MAX_METADATA_RECORDS:-null}"
      HF_STREAM_BATCH_SIZE:  "${HF_STREAM_BATCH_SIZE:-100000}"
      HF_TOKEN:              "${HF_TOKEN:-}"
      BRONZE_BASE_PATH:      "s3a://recsys/bronze"
      PYTHONUNBUFFERED:      "1"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/logs:/app/data/logs
      - ./scripts:/app/scripts
      - hf_cache:/app/.cache/huggingface
    mem_limit: 5g # Giới hạn Docker cho Driver
    cpus: "1.0"
    networks:
      - recsys_net

  # ── Pipeline test nhanh (20k records) ─────────────────────────
  pipeline-test:
    image: recsys-pipeline:v3
    container_name: recsys_pipeline_test
    hostname: pipeline-driver-test
    depends_on:
      minio-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    entrypoint: ["/app/scripts/run_pipeline.sh"]
    environment:
      <<: *spark-s3a-env
      SPARK_DRIVER_MEMORY:   "2g"
      SPARK_EXECUTOR_MEMORY: "2g"
      SPARK_EXECUTOR_CORES:  "1"
      MAX_REVIEW_RECORDS:    "20000"
      MAX_METADATA_RECORDS:  "5000"
      HF_STREAM_BATCH_SIZE:  "10000"
      HF_TOKEN:              "${HF_TOKEN:-}"
      BRONZE_BASE_PATH:      "s3a://recsys/bronze"
      PYTHONUNBUFFERED:      "1"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data/logs:/app/data/logs
      - hf_cache:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "1"
    networks:
      - recsys_net
    profiles:
      - test

networks:
  recsys_net:
    driver: bridge

volumes:
  minio_data:
    driver: local
  hf_cache:
    driver: local