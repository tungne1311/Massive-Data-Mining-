# RecSys Pipeline config (Bronze -> Silver -> Gold)

huggingface:
  review_dataset:   "McAuley-Lab/Amazon-Reviews-2023"
  review_subset:    "raw_review_Electronics"
  metadata_dataset: "McAuley-Lab/Amazon-Reviews-2023"
  metadata_subset:  "raw_meta_Electronics"
  stream_batch_size:    150000
  max_review_records:   null
  max_metadata_records: null

minio:
  endpoint:    "http://minio:9000"
  access_key:  "minioadmin"
  secret_key:  "minioadmin"
  bucket:      "recsys"

spark:
  app_name:          "RecSys_Pipeline"
  master:            "local[*]"
  driver_memory:     "4g"
  executor_memory:   "4g"
  executor_cores:    "2"
  shuffle_partitions: "200"
  parquet_compression: "zstd"

bronze:
  write_mode: "overwrite"
  cleanup_landing: true
  view: "full_realistic"              # full_realistic = no k-core | warm_core = user-core benchmark
  apply_user_core: false
  warm_core_user_min_interactions: 5
  upload_workers: 4

silver:
  write_mode: "overwrite"
  tail_max_train_freq: 10
  mid_max_train_freq: 50
  use_item_review_text: true
  user_profile_top_k_reviews: 3
  item_review_top_k_reviews: 2

gold:
  write_mode: "overwrite"
  embedding_dim: 384
  negative_sampling_strategy: "uniform"  # uniform | popularity | inverse_frequency | blended
  negative_sampling_beta: 0.75
  neg_sampling_blend_alpha: 0.70
  warm_graph_user_min_train_freq: 3
  temp_dir: "data/gold_temp"
