version: "3.8"

# ================================================================
# Spark Standalone Cluster + MinIO trên máy cá nhân
#
# Kiến trúc:
#   spark-master  : Master node  (port 8080 UI, 7077 RPC)
#   spark-worker-1: Worker 1     (port 8081 UI)
#   spark-worker-2: Worker 2     (port 8082 UI)
#   minio         : Object store (port 9000 API, 9001 Console)
#   jupyter       : Notebook     (port 8888)
#
# ================================================================

x-spark-common: &spark-common
  image: bitnamilegacy/spark:3.5.1
  environment:
    # MinIO / S3A credentials 
    - AWS_ACCESS_KEY_ID=minioadmin
    - AWS_SECRET_ACCESS_KEY=minioadmin
    # Truyền JAR path cho S3A connector
    - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/jars/hadoop-aws-3.3.4.jar:/opt/bitnami/spark/jars/aws-java-sdk-bundle-1.12.367.jar
  volumes:
    # Mount thư mục chứa JAR S3A 
    - ./jars:/opt/bitnami/spark/custom-jars:ro
    # Mount notebook và data local
    - ./notebooks:/home/jovyan/work
    - ./data:/mnt/data

services:

  # ── MinIO ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tạo bucket tự động khi MinIO khởi động
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/datalake &&
      mc anonymous set download local/datalake &&
      echo 'Bucket datalake created'
      "

  # ── Spark Master ───────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      # S3A config cho toàn cluster
      - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/custom-jars/hadoop-aws-3.3.4.jar:/opt/bitnami/spark/custom-jars/aws-java-sdk-bundle-1.12.367.jar
      - SPARK_SUBMIT_OPTIONS=--conf spark.hadoop.fs.s3a.endpoint=http://minio:9000 --conf spark.hadoop.fs.s3a.access.key=minioadmin --conf spark.hadoop.fs.s3a.secret.key=minioadmin --conf spark.hadoop.fs.s3a.path.style.access=true --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false
    ports:
      - "8085:8080"     # Spark Master UI → http://localhost:8080
      - "7077:7077"     # Spark RPC (notebook kết nối vào đây)
    volumes:
      - ./jars:/opt/bitnami/spark/custom-jars:ro
      - ./notebooks:/home/jovyan/work
      - ./data:/mnt/data

  # ── Spark Worker 1 ─────────────────────────────────────────────
  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4          # số CPU core worker dùng
      - SPARK_WORKER_MEMORY=4G        # RAM worker 
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/bitnami/spark/custom-jars:ro
      - ./data:/mnt/data

  # ── Spark Worker 2 ─────────────────────────────────────────────
  # Thêm worker = thêm parallelism khi ghi parquet vào MinIO
  # Trên máy 8-core: có thể chạy 3-4 workers, mỗi cái 2 core 4GB
  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_WEBUI_PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/bitnami/spark/custom-jars:ro
      - ./data:/mnt/data

  # ── Jupyter Notebook ───────────────────────────────────────────
  # Chạy notebook kết nối tới spark-master
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"     # Jupyter UI → http://localhost:8888
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./jars:/home/jovyan/jars:ro
      - ./data:/mnt/data
    depends_on:
      - spark-master

volumes:
  minio_data:
    driver: local
